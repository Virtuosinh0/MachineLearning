[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]
aptPackages = [
  "build-essential",
  "python3-dev",
  "libopenblas-dev",
  "liblapack-dev",
  "libomp-dev"
]

[phases.build]
cmds = [
  "pip install -r requirements.txt"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1"